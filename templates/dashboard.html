<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background-color: #f4f4f9; color: #1a1a1a; transition: 0.5s; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.1); }
        .dark-mode { background-color: #000 !important; color: #fff !important; }
        .dark-mode .glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body id="main-body" class="min-h-screen flex flex-col overflow-hidden">
    
    <header class="p-3 flex justify-between items-center z-50">
        <div class="relative">
            <button onclick="toggleDropdown()" class="glass px-4 py-2 rounded-2xl flex items-center gap-3 hover:bg-white transition">
                <div class="w-10 h-10 bg-{{ 'red' if role == 'admin' else 'blue' }}-600 rounded-full flex items-center justify-center text-white font-bold text-lg">{{ user[0] }}</div>
                <div class="flex flex-col">
                    <p class="text-sm font-bold">{{ user }} ({{ role.upper() }})</p>
                    {% if session.get('auth_method') == 'google' %}
                        <p class="text-xs text-green-600">🔗 Google Account</p>
                    {% else %}
                        <p class="text-xs text-blue-600">👤 Local Account</p>
                    {% endif %}
                </div>
                <span class="text-xs">▼</span>
            </button>
            <div id="profile-dropdown" class="hidden absolute left-0 mt-2 w-56 glass rounded-2xl shadow-xl overflow-hidden border border-gray-100">
                <div class="border-b">
                    <button onclick="openModal('activity')" class="w-full text-left px-4 py-3 text-xs font-semibold hover:bg-blue-50 transition">🕒 Recent Activity</button>
                    <button onclick="openModal('history')" class="w-full text-left px-4 py-3 text-xs font-semibold hover:bg-blue-50 transition">📜 Command History</button>
                </div>
                
                {% if role == 'admin' %}
                <div class="border-b bg-red-50">
                    <p class="px-4 py-2 text-xs font-bold text-red-600">ADMIN CONTROLS</p>
                    <a href="/admin" class="block w-full text-left px-4 py-3 text-xs font-semibold hover:bg-red-100 transition">⚙️ Admin Panel</a>
                    <button onclick="sendCommand('system info')" class="w-full text-left px-4 py-3 text-xs font-semibold hover:bg-red-100 transition">💻 System Info</button>
                    <button onclick="sendCommand('user list')" class="w-full text-left px-4 py-3 text-xs font-semibold hover:bg-red-100 transition">👥 User List</button>
                    <button onclick="sendCommand('shutdown system')" class="w-full text-left px-4 py-3 text-xs font-semibold hover:bg-red-100 transition">🛑 Shutdown System</button>
                </div>
                
                <div class="border-b">
                    <p class="px-4 py-2 text-xs font-bold text-gray-600">QUICK ACTIONS</p>
                    <button onclick="sendCommand('battery')" class="w-full text-left px-4 py-3 text-xs font-semibold hover:bg-gray-50 transition">🔋 Check Battery</button>
                    <button onclick="sendCommand('time')" class="w-full text-left px-4 py-3 text-xs font-semibold hover:bg-gray-50 transition">⏰ Current Time</button>
                    <button onclick="sendCommand('add contact')" class="w-full text-left px-4 py-3 text-xs font-semibold hover:bg-gray-50 transition">👤 Add Contact</button>
                </div>
                {% endif %}
                
                <div class="border-t">
                    <a href="/contacts" class="block w-full text-left px-4 py-3 text-xs font-semibold hover:bg-blue-50 transition">👤 Contacts</a>
                    <a href="/logout" class="block w-full text-left px-4 py-3 text-xs font-bold text-red-500 hover:bg-red-50 transition">🚪 Log Out</a>
                </div>
            </div>
        </div>

        <div class="flex gap-4 items-center">
            <div class="glass p-2 rounded-xl flex gap-2">
                <button onclick="setLang('en')" id="en-btn" class="px-3 text-sm font-bold">EN</button>
                <button onclick="setLang('te')" id="te-btn" class="px-3 text-sm text-blue-600">తెలుగు</button>
            </div>
            <button onclick="toggleTheme()" id="theme-icon" class="text-2xl">☀️</button>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6">
        <div class="flex gap-8 w-full max-w-7xl items-center">
            <!-- Left Suggestions Panel -->
            <div class="flex flex-col gap-3">
                <!-- Basic Commands -->
                <button onclick="sendCommand('battery')" class="glass w-20 h-20 rounded-2xl flex flex-col items-center justify-center hover:bg-blue-50 transition group">
                    <span class="text-2xl">🔋</span>
                    <span class="text-[8px] mt-1 opacity-0 group-hover:opacity-100 font-bold">Battery</span>
                </button>
                <button onclick="sendCommand('time')" class="glass w-20 h-20 rounded-2xl flex flex-col items-center justify-center hover:bg-blue-50 transition group">
                    <span class="text-2xl">⏰</span>
                    <span class="text-[8px] mt-1 opacity-0 group-hover:opacity-100 font-bold">Time</span>
                </button>
                <button onclick="sendCommand('reminder')" class="glass w-20 h-20 rounded-2xl flex flex-col items-center justify-center hover:bg-blue-50 transition group">
                    <span class="text-2xl">📅</span>
                    <span class="text-[8px] mt-1 opacity-0 group-hover:opacity-100 font-bold">Reminder</span>
                </button>
                <button onclick="sendCommand('add contact')" class="glass w-20 h-20 rounded-2xl flex flex-col items-center justify-center hover:bg-blue-50 transition group">
                    <span class="text-2xl">👤</span>
                    <span class="text-[8px] mt-1 opacity-0 group-hover:opacity-100 font-bold">Add Contact</span>
                </button>
            </div>

            <!-- Center Content -->
            <div class="flex-1 flex flex-col items-center justify-center">
                <div class="w-64 h-64 bg-white shadow-2xl rounded-full flex items-center justify-center text-9xl">🤖</div>
                <div class="mt-10 text-center w-full max-w-md">
                    <div class="flex items-center justify-center gap-4">
                        <p id="status" class="text-xs text-blue-500 uppercase tracking-widest font-bold">Listening...</p>
                        <p id="current-input" class="text-xs text-gray-400 italic max-w-xs truncate"></p>
                    </div>
                    <div id="output-display" class="mt-4 text-xs text-gray-300 italic min-h-[60px] max-h-[120px] overflow-y-auto"></div>
                    <input type="text" id="manual-input" placeholder="Type here (Voice will pause)..." 
                           class="mt-6 w-full p-4 rounded-3xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500 transition shadow-sm">
                </div>
            </div>
            
            <!-- Right Suggestions Panel -->
            <div class="flex flex-col gap-3">
                <!-- Communication Commands -->
                <button onclick="sendCommand('whatsapp')" class="glass w-20 h-20 rounded-2xl flex flex-col items-center justify-center hover:bg-green-50 transition group">
                    <span class="text-2xl">📞</span>
                    <span class="text-[8px] mt-1 opacity-0 group-hover:opacity-100 font-bold">WhatsApp</span>
                </button>
                <button onclick="sendCommand('send email')" class="glass w-20 h-20 rounded-2xl flex flex-col items-center justify-center hover:bg-red-50 transition group">
                    <span class="text-2xl">✉️</span>
                    <span class="text-[8px] mt-1 opacity-0 group-hover:opacity-100 font-bold">Email</span>
                </button>
                <button onclick="sendCommand('read mail')" class="glass w-20 h-20 rounded-2xl flex flex-col items-center justify-center hover:bg-purple-50 transition group">
                    <span class="text-2xl">📧</span>
                    <span class="text-[8px] mt-1 opacity-0 group-hover:opacity-100 font-bold">Read Mail</span>
                </button>
                <button onclick="sendCommand('summarize mail')" class="glass w-20 h-20 rounded-2xl flex flex-col items-center justify-center hover:bg-purple-50 transition group">
                    <span class="text-2xl">📋</span>
                    <span class="text-[8px] mt-1 opacity-0 group-hover:opacity-100 font-bold">Summarize</span>
                </button>
            </div>
        </div>
        
        <!-- Bottom System Commands -->
        <div class="flex gap-4 mt-8">
            <button onclick="sendCommand('reset')" class="glass w-20 h-20 rounded-2xl flex flex-col items-center justify-center hover:bg-yellow-50 transition group">
                <span class="text-2xl">🔄</span>
                <span class="text-[8px] mt-1 opacity-0 group-hover:opacity-100 font-bold">Reset</span>
            </button>
            <button onclick="sendCommand('stop')" class="glass w-20 h-20 rounded-2xl flex flex-col items-center justify-center hover:bg-red-50 transition group">
                <span class="text-2xl">🛑</span>
                <span class="text-[8px] mt-1 opacity-0 group-hover:opacity-100 font-bold">Stop</span>
            </button>
            <button onclick="window.location.href='/contacts'" class="glass w-20 h-20 rounded-2xl flex flex-col items-center justify-center hover:bg-blue-50 transition group">
                <span class="text-2xl">👤</span>
                <span class="text-[8px] mt-1 opacity-0 group-hover:opacity-100 font-bold">Contacts</span>
            </button>
            {% if role == 'admin' %}
            <button onclick="window.location.href='/admin'" class="glass w-20 h-20 rounded-2xl flex flex-col items-center justify-center hover:bg-red-50 transition group">
                <span class="text-2xl">⚙️</span>
                <span class="text-[8px] mt-1 opacity-0 group-hover:opacity-100 font-bold">Admin</span>
            </button>
            {% endif %}
            <button onclick="testConnection()" class="glass w-20 h-20 rounded-2xl flex flex-col items-center justify-center hover:bg-gray-50 transition group">
                <span class="text-2xl">🔧</span>
                <span class="text-[8px] mt-1 opacity-0 group-hover:opacity-100 font-bold">Test</span>
            </button>
        </div>
    </main>

    <footer class="p-6 flex justify-center items-center">
        <p class="text-xs text-gray-400"> 2026 Vira Assistant</p>
    </footer>

    <div id="data-modal" class="hidden fixed inset-0 bg-black/20 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
        <div class="glass w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-xl font-bold">Data</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-black">✕</button>
            </div>
            <div id="modal-content" class="max-h-80 overflow-y-auto space-y-2 pr-2"></div>
        </div>
    </div>

    <script src="/static/voice.js"></script>
    <script>
        function toggleDropdown() { document.getElementById('profile-dropdown').classList.toggle('hidden'); }
        
        function toggleTheme() {
            const b = document.getElementById('main-body');
            b.classList.toggle('dark-mode');
            document.getElementById('theme-icon').innerText = b.classList.contains('dark-mode') ? "🌙" : "☀️";
        }

        function setLang(l) {
            document.getElementById('status').innerText = (l==='te') ? "వాయిస్ వింటున్నాను..." : "Listening...";
        }

        async function openModal(type) {
            const modal = document.getElementById('data-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            content.innerHTML = "Loading...";
            const res = await fetch(`/api/${type}`);
            const data = await res.json();
            document.getElementById('modal-title').innerText = type === 'history' ? "Command History" : "Recent Activity";
            content.innerHTML = data.reverse().map(i => `
                <div class="p-3 bg-white/50 rounded-xl border border-gray-100 flex justify-between">
                    <span>${i.command || i.name}</span>
                    <span class="text-[10px] text-gray-400">${i.time}</span>
                </div>
            `).join('') || "No records found.";
        }
        function closeModal() { document.getElementById('data-modal').classList.add('hidden'); }

        function sendCommand(command) {
            console.log('Sending command via button:', command);
            document.getElementById('current-input').innerText = command;
            socket.emit('voice_command', {text: command});
        }

        function testConnection() {
            console.log('Testing Socket.IO connection...');
            document.getElementById('output-display').innerText = 'Testing connection...';

            // Test basic connection
            if (socket.connected) {
                console.log('Socket is connected, ID:', socket.id);
                document.getElementById('output-display').innerText = 'Socket connected! Testing command...';
                socket.emit('voice_command', {text: 'battery'});
            } else {
                console.log('Socket not connected!');
                document.getElementById('output-display').innerText = 'Socket not connected!';
            }
        }

        // Add connection status indicator
        socket.on('connect', () => {
            console.log('Connected to server!');
            document.getElementById('output-display').innerText = 'Connected to server!';
        });

        socket.on('disconnect', () => {
            console.log('Disconnected from server!');
            document.getElementById('output-display').innerText = 'Disconnected from server!';
        });

        socket.on('connect_error', (error) => {
            console.log('Connection error:', error);
            document.getElementById('output-display').innerText = 'Connection error: ' + error.message;
        });

        // Handle admin login success event
        socket.on('admin_login_success', (data) => {
            console.log('Admin login successful:', data);
            // Redirect to admin dashboard
            window.location.href = '/admin';
        });
        
        // Handle transcript updates with AI responses - SIMPLIFIED
        socket.on('transcript_update', (data) => {
            console.log('Transcript update:', data);
            
            if (data.type === 'ai_conversation') {
                // Show input beside listening
                document.getElementById('current-input').innerText = data.user_input;
                
                // Show output in dimmed lines below
                const outputDiv = document.getElementById('output-display');
                const timestamp = new Date().toLocaleTimeString();
                
                // Add new line with AI response
                const newLine = document.createElement('div');
                newLine.innerHTML = `<span class="text-gray-400">[${timestamp}]</span> ${data.ai_response}`;
                outputDiv.appendChild(newLine);
                
                // Keep only last 5 lines
                const lines = outputDiv.children;
                if (lines.length > 5) {
                    outputDiv.removeChild(lines[0]);
                }
                
                // Auto-scroll to bottom
                outputDiv.scrollTop = outputDiv.scrollHeight;
            }
        });
        
        // Handle force logout event (simplified)
        socket.on('force_logout', () => {
            console.log('Force logout received');
            // Immediate redirect to localhost:5000/
            window.location.href = 'http://localhost:5000/';
        });
        
        // Handle logout redirect event (backup)
        socket.on('logout_redirect', (data) => {
            console.log('Logout redirect received:', data);
            // Redirect to localhost:5000/ after a short delay
            setTimeout(() => {
                window.location.href = 'http://localhost:5000/';
            }, 1000);
        });
    </script>
</body>
</html>
