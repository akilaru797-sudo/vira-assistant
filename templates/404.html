<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f4f4f9; color: #1a1a1a; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.1); }
    </style>
    <title>Page Not Found - Vira Assistant</title>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="glass p-10 rounded-[2.5rem] w-full max-w-md shadow-xl text-center">
        <div class="text-6xl mb-4">🤖</div>
        <h1 class="text-3xl font-bold text-gray-900 mb-2">404</h1>
        <p class="text-gray-600 mb-6">Page not found</p>
        <p class="text-sm text-gray-500 mb-8">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="inline-block bg-blue-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-blue-700 transition">
            Go Home
        </a>
    </div>
</body>
</html>
