<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vira - Manage Contacts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f4f4f9; color: #1a1a1a; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-bold text-gray-800">Manage Contacts</h1>
            <button onclick="window.location.href='/dashboard'" class="glass px-6 py-2 rounded-xl text-blue-600 font-bold hover:bg-white transition shadow-sm">← Dashboard</button>
        </header>

        <div class="glass rounded-[2.5rem] shadow-2xl overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50/50">
                    <tr>
                        <th class="p-6 text-xs font-bold uppercase tracking-widest text-gray-400">Name</th>
                        <th class="p-6 text-xs font-bold uppercase tracking-widest text-gray-400">Detail</th>
                        <th class="p-6 text-xs font-bold uppercase tracking-widest text-gray-400">Added At</th>
                        <th class="p-6 text-xs font-bold uppercase tracking-widest text-gray-400 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="contact-list" class="divide-y divide-gray-100 bg-white/30">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadContacts() {
            // FIX: Changed from /api/activity to /api/contacts to match app.py
            const res = await fetch('/api/contacts');
            const contacts = await res.json();
            const list = document.getElementById('contact-list');
            
            if (!contacts || !contacts.length) {
                list.innerHTML = "<tr><td colspan='4' class='p-10 text-center text-gray-400 italic'>No contacts found in your list, Aditya.</td></tr>";
                return;
            }

            // Reverse to show newest at the top
            const reversed = contacts.slice().reverse();
            list.innerHTML = reversed.map((c, i) => {
                const originalIdx = contacts.length - 1 - i;
                return `
                    <tr class="hover:bg-white/60 transition">
                        <td class="p-6 font-semibold text-gray-800">${c.name}</td>
                        <td class="p-6 font-mono text-sm text-blue-600">${c.detail}</td>
                        <td class="p-6 text-xs text-gray-400">${c.time}</td>
                        <td class="p-6 flex justify-center gap-6">
                            <button onclick="editContact(${originalIdx}, '${c.name}', '${c.detail}')" class="text-blue-500 font-bold text-xs uppercase tracking-tighter hover:underline">Modify</button>
                            <button onclick="deleteContact(${originalIdx})" class="text-red-400 font-bold text-xs uppercase tracking-tighter hover:underline">Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function deleteContact(index) {
            if (confirm("Aditya, are you sure you want to delete this contact?")) {
                const res = await fetch(`/api/contacts/delete/${index}`, { method: 'POST' });
                if (res.ok) loadContacts();
            }
        }

        async function editContact(index, name, detail) {
            const n = prompt("Edit Name:", name);
            const d = prompt("Edit Detail (Email or Number):", detail);
            if (n !== null && d !== null) {
                const res = await fetch(`/api/contacts/update/${index}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: n, detail: d })
                });
                if (res.ok) loadContacts();
            }
        }

        window.onload = loadContacts;
    </script>
</body>
</html>
