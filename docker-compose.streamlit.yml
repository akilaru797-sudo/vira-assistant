version: '3.8'

services:
  vira-streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: vira-assistant-streamlit
    ports:
      - "8501:8501"
    volumes:
      # Persist data files
      - ./data:/app/data
      # Mount user database
      - ./user_database.json:/app/user_database.json
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - vira-streamlit-network

networks:
  vira-streamlit-network:
    driver: bridge

volumes:
  vira-streamlit-data:
    driver: local
