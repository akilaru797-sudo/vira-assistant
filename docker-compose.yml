version: '3.8'

services:
  vira-assistant:
    build: .
    container_name: vira-assistant
    ports:
      - "5000:5000"
    volumes:
      # Persist data files
      - ./data:/app/data
      - ./logs:/app/logs
      # Mount user database and contacts
      - ./user_database.json:/app/user_database.json
      - ./contacts.json:/app/contacts.json
      - ./command_history.json:/app/command_history.json
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/test"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - vira-network

networks:
  vira-network:
    driver: bridge

volumes:
  vira-data:
    driver: local
  vira-logs:
    driver: local
